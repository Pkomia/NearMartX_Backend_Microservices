server:
  port: 8761
  
spring:
  application:
   name: discovery-server


# Configure Actuator Endpoint
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always


eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false

