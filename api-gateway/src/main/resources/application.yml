server:
  port: 8080

spring:
  application:
   name: api-gateway

## Define product service route
  cloud:
    gateway:
      server:
        webmvc:
          routes:
# Define user service route 
          - id: user-service
            uri: lb://user-service
            predicates:
            - Path=/api/v1/auth/**
              
# Define product service route
          - id: product-service
            uri: lb://product-service
            predicates:
            - Path=/api/product/**

## Define order service route 
          - id: order-service
            uri: lb://order-service
            predicates:
            - Path=api/order/**

## Define Inventory service route 
          - id: inventory-service
            uri: lb://inventory-service
            predicates:
            - Path=api/inventory/**

## Define Eureka service route 
          - id: discovery-server
            uri: http://localhost:8761
            predicates:
            - Path=eureka/web/**
            filters:
            - SetPath=/
## Discover Eureka server static resources
          - id: discovery-server-static
            uri: http://localhost:8761
            predicates:
            - Path=eureka/**
              
              
              




eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka


logging:
  level:
    root: INFO
    org:
      springframework:
        cloud:
          gateway:
            route:
              RouteDefinitionLocator: INFO
        web: INFO
      hibernate: ERROR

 