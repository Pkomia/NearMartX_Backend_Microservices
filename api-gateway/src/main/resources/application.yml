server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userKeyResolver}"
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/product/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/order/**

            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**

            - id: discovery-server
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/**
              filters:
                - RewritePath=/eureka/?(?<segment>.*), /${segment}